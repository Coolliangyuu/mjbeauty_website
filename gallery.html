<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>影像档案馆 - 🌍𝐌𝐉全球华人之家🕊️</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100vh; overflow: hidden; background: #000; }
        
        /* ȷ�� pjax-container ����ȫ�� */
        #pjax-container { width: 100%; height: 100%; }
        
        .mj-iframe { width: 100%; height: 100%; border: none; display: block; }
    </style>
</head>
<body>

    <div id="pjax-container">
        
        <iframe id="alist-frame" class="mj-iframe"></iframe>

        <script>
            // ������������������ֹ������Ⱦ
            (function() {
                // 1. ��ȡ����ϴ��ǰ·��
                let currentPath = window.location.pathname; 
                let alistPath = currentPath.replace(/^\/pic/, '');
                // ȷ��·����Զ�� / ��ͷ����ֹƴ�ӳ���
                if (!alistPath.startsWith('/')) alistPath = '/' + alistPath;

                // 2. ��̬���� iframe ������Ⱦ
                let frame = document.getElementById('alist-frame');
                if (frame) {
                    frame.src = "https://pic.mjbeauty.top" + alistPath;
                }

                // 3. �������޸���������ȫ��������ֹ PJAX ��ν��뵼���ظ��󶨼�����
                if (!window.alistListenerBound) {
                    window.addEventListener('message', function(e) {
                        if (e.data && e.data.type === 'ALIST_PATH_UPDATE') {
                            // ƴ����վαװ��ַ������ϴ�����б��
                            let newUrl = ('/pic' + e.data.path).replace(/\/\//g, '/');
                            
                            // ʹ�� history.replaceState ��ˢ���޸ĵ�ַ��
                            if (window.location.pathname !== newUrl) {
                                window.history.replaceState(null, '', newUrl);
                            }
                        }
                    });
                    window.alistListenerBound = true; // ����
                }
            })();
        </script>
        
    </div>
    
  <script src="https://1818461212.v.123pan.cn/1818461212/%E7%BD%91%E7%AB%99/mj.lyimc.top/mj-music.js"></script>
  <script src="https://1818461212.v.123pan.cn/1818461212/%E7%BD%91%E7%AB%99/mj.lyimc.top/mj-pjax.js"></script>
</body>
</html>

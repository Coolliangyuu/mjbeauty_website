<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#090a0f">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>千人成像巨献 · 🌍𝐌𝐉全球华人之家🕊️</title>
    <link rel="shortcut icon" type="image/ico" href="https://1818461212.v.123pan.cn/1818461212/%E7%BD%91%E7%AB%99/mj.lyimc.top/IMG_1483.svg">

    <style>
        :root {
            --mj-gold: #f3cf7a;
            --mj-white: #ffffff;
            --bg-color: #090a0f;
            --glass-bg: rgba(255, 255, 255, 0.03);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            background-color: var(--bg-color);
            color: var(--mj-white);
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            overflow: hidden; 
            display: flex;
            flex-direction: column;
        }

        /* 动态星空流星背景 */
        .stars-container {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0; 
            pointer-events: none; 
            background-image: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
        }

        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            opacity: 0.3;
            animation: twinkle 3s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* 顶部精致标题区域 */
        .mosaic-header {
            position: relative;
            z-index: 20;
            width: 100%;
            height: 11vh; 
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: rgba(9, 10, 15, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-bottom: 1px solid rgba(243, 207, 122, 0.15);
            padding: 10px 20px;
        }

        .back-btn {
            position: absolute;
            left: 30px;
            top: 50%;
            transform: translateY(-50%);
            text-decoration: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.85rem;
            letter-spacing: 1px;
            /* 加入文字渐隐动画 */
            transition: opacity 0.3s ease, color 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease, transform 0.3s ease;
            padding: 6px 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.02);
            cursor: pointer;
            opacity: 1; 
        }
        
        .back-btn:hover {
            color: var(--mj-gold);
            border-color: var(--mj-gold);
            box-shadow: 0 0 10px rgba(243, 207, 122, 0.2);
            transform: translateY(-50%) scale(1.02);
        }

        .main-title {
            font-size: 1.55rem;
            letter-spacing: 5px;
            text-indent: 5px; 
            color: var(--mj-white);
            font-weight: 300;
            margin-bottom: 3px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.2);
            transition: opacity 0.3s ease; /* 加入文字渐隐动画 */
            opacity: 1;
        }

        .sub-title {
            font-size: 0.88rem;
            letter-spacing: 2px;
            color: var(--mj-gold);
            font-weight: 300;
            opacity: 0.9;
            text-shadow: 0 0 10px rgba(243, 207, 122, 0.2);
        }

        /* =========================================
           新增：统一控制动画的视图主容器
           ========================================= */
        .screens-wrapper {
            position: relative;
            flex: 1; /* 吃满顶部 header 以下的所有空间 */
            width: 100%;
            overflow: hidden; /* 防止两个界面切换时出现页面跳动 */
        }

        /* 界面通用动画基类 */
        .screen-view {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            /* 核心动画引擎：控制透明度、缩放、可见性 */
            transition: opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1), transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), visibility 0.6s;
        }

        /* 隐藏状态：透明，轻微缩小，不可点击 */
        .screen-hidden {
            opacity: 0;
            visibility: hidden;
            transform: scale(0.95); 
            pointer-events: none;
        }

        /* 激活状态：完全显示，恢复原本大小，可交互 */
        .screen-active {
            opacity: 1;
            visibility: visible;
            transform: scale(1);
            pointer-events: auto;
        }

        /* =========================================
           界面一：选图卡片容器
           ========================================= */
        .selection-container {
            padding: 40px 20px;
            overflow-y: auto; /* 依然允许上下滑动 */
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .selection-intro {
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.95rem;
            letter-spacing: 3px;
            margin-bottom: 35px;
            text-align: center;
        }

        .mosaic-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 30px; 
            width: 100%;
            max-width: 1100px;
            padding-bottom: 60px;
        }

        .mosaic-card {
            background: var(--glass-bg);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.4s cubic-bezier(0.19, 1, 0.22, 1);
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 45px 20px 35px 20px; 
        }

        .mosaic-card:hover {
            border-color: rgba(243, 207, 122, 0.3); 
            background: rgba(243, 207, 122, 0.03);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.5), 0 0 20px rgba(243, 207, 122, 0.08);
            transform: translateY(-5px);
        }

        .card-number {
            position: absolute;
            top: 15px; right: 25px;
            font-size: 2.2rem;
            font-family: "Optima", "Georgia", serif;
            color: rgba(243, 207, 122, 0.15); 
            font-style: italic;
            pointer-events: none;
            transition: color 0.4s ease, text-shadow 0.4s ease;
        }

        .mosaic-card:hover .card-number {
            color: rgba(243, 207, 122, 0.5);
            text-shadow: 0 0 15px rgba(243, 207, 122, 0.2);
        }

        .card-img-box {
            width: 150px; 
            aspect-ratio: 3 / 4; 
            position: relative;
            border-radius: 6px; 
            overflow: hidden;
            margin-bottom: 25px; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5); 
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .card-img-box img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            transition: transform 0.6s ease;
            display: block;
        }

        .mosaic-card:hover .card-img-box img {
            transform: scale(1.08); 
        }

        .card-info { text-align: center; }
        .card-title { font-size: 1.25rem; color: var(--mj-gold); letter-spacing: 2px; margin-bottom: 8px; font-weight: 300; }
        .card-desc { font-size: 0.8rem; color: rgba(255, 255, 255, 0.4); letter-spacing: 1px; line-height: 1.6; }

        /* =========================================
           界面二：底层 Iframe 展示区
           ========================================= */
        .iframe-container {
            background: #000000; 
        }

        .mosaic-iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* 锁定卡片的 UI 样式 */
        .mosaic-card.locked {
            filter: grayscale(1) opacity(0.6);
            cursor: not-allowed;
        }
        .lock-icon {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 3rem;
            z-index: 2;
        }
        
        /* 【关键修复】：让 pjax 容器继承全屏高度和弹性布局，防止内部元素高度塌陷为 0 */
        #pjax-container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
        }

        /* 手机移动端针对性版面优化 */
        @media (max-width: 600px) {
            .mosaic-header { height: 14vh; min-height: 95px; padding-top: 20px; }
            .back-btn { position: relative; left: 0; top: 0; transform: none; margin-bottom: 6px; font-size: 0.75rem; padding: 4px 12px; }
            .back-btn:hover { transform: scale(1.02); }
            .main-title { font-size: 1.2rem; letter-spacing: 3px; text-indent: 3px; }
            .sub-title { font-size: 0.75rem; letter-spacing: 1px; }
            
            .selection-container { padding: 25px 15px; }
            .selection-intro { font-size: 0.8rem; margin-bottom: 25px; }
            
            .mosaic-grid { grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 15px; }
            .mosaic-card { padding: 30px 15px 20px 15px; }
            .card-img-box { width: 100px; margin-bottom: 15px; } 
            .card-title { font-size: 1.1rem; }
            .card-number { font-size: 1.6rem; top: 10px; right: 15px; }
        }
    </style>
</head>
<body>
<div id="pjax-container">
    <div class="stars-container" id="starField"></div>

    <header class="mosaic-header">
        <a href="../" class="back-btn" id="smartBackBtn">← 返回</a>
        <h1 class="main-title" id="headerTitle">千人成像巨献</h1>
        <div class="sub-title">🌍𝐌𝐉全球华人之家🕊️</div>
    </header>

    <div class="screens-wrapper">
        
        <main class="selection-container screen-view screen-active" id="selectionScreen">
            <p class="selection-intro">请选择您要探索的成像画卷</p>
            
<div class="mosaic-grid">
    <!-- 第 1-2 项：锁定状态 -->
    <div class="mosaic-card locked" onclick="showLockedAlert()">
        <div class="card-number">01</div>
        <div class="card-img-box">
            <img src="https://via.placeholder.com/600x800/1b2735/f3cf7a?text=LOCKED" alt="">
            <div class="lock-icon">🔒</div>
        </div>
        <div class="card-info">
            <h3 class="card-title">仍未解锁</h3>
            <p class="card-desc">6月25日解锁</p>
        </div>
    </div>

    <div class="mosaic-card locked" onclick="showLockedAlert()">
        <div class="card-number">02</div>
        <div class="card-img-box">
            <img src="https://via.placeholder.com/600x800/1b2735/f3cf7a?text=LOCKED" alt="">
            <div class="lock-icon">🔒</div>
        </div>
        <div class="card-info">
            <h3 class="card-title">仍未解锁</h3>
            <p class="card-desc">6月25日解锁</p>
        </div>
    </div>

    <!-- 第 3-6 项：正常开启 (记得根据你的实际路径修改链接) -->
    <div class="mosaic-card" onclick="openMosaic('./3/', '画卷三')">
        <div class="card-number">03</div>
        <div class="card-img-box"><img src="https://1818461212.v.123pan.cn/1818461212/%E7%BD%91%E7%AB%99/mj.lyimc.top/agiftformj/qrcx/openproject/3/mosaic_tiles_files/8/0_0.jpeg" alt="画卷三"></div>
        <div class="card-info">
            <h3 class="card-title">画卷三</h3>
        </div>
    </div>

    <div class="mosaic-card" onclick="openMosaic('./4/', '画卷四')">
        <div class="card-number">04</div>
        <div class="card-img-box"><img src="https://1818461212.v.123pan.cn/1818461212/%E7%BD%91%E7%AB%99/mj.lyimc.top/agiftformj/qrcx/openproject/4/mosaic_tiles_files/8/0_0.jpeg" alt="画卷四"></div>
        <div class="card-info">
            <h3 class="card-title">画卷四</h3>
        </div>
    </div>

    <div class="mosaic-card" onclick="openMosaic('./5/', '画卷五')">
        <div class="card-number">05</div>
        <div class="card-img-box"><img src="https://1818461212.v.123pan.cn/1818461212/%E7%BD%91%E7%AB%99/mj.lyimc.top/agiftformj/qrcx/openproject/5/mosaic_tiles_files/8/0_0.jpeg" alt="画卷五"></div>
        <div class="card-info">
            <h3 class="card-title">画卷五</h3>
        </div>
    </div>

    <div class="mosaic-card" onclick="openMosaic('./6/', '画卷六')">
        <div class="card-number">06</div>
        <div class="card-img-box"><img src="https://1818461212.v.123pan.cn/1818461212/%E7%BD%91%E7%AB%99/mj.lyimc.top/agiftformj/qrcx/openproject/6/mosaic_tiles_files/8/0_0.jpeg" alt="画卷六"></div>
        <div class="card-info">
            <h3 class="card-title">画卷六</h3>
        </div>
    </div>
</div>
        </main>

        <main class="iframe-container screen-view screen-hidden" id="iframeScreen">
            <iframe class="mosaic-iframe" id="mosaicIframe" src="" allowfullscreen="true" scrolling="auto"></iframe>
        </main>

    </div>

    <script>
        // 用匿名自执行函数包裹，完美解决 PJAX 变量冲突崩溃的问题
        (function() {
            // 1. 背景流星自渲染 (增加清空逻辑，防止 PJAX 多次进出星星翻倍)
            const field = document.getElementById('starField');
            if (field) {
                field.innerHTML = ''; 
                for (let i = 0; i < 70; i++) {
                    const star = document.createElement('div');
                    star.className = 'star';
                    const size = Math.random() * 2 + 1 + 'px';
                    star.style.width = size;
                    star.style.height = size;
                    star.style.left = Math.random() * 100 + '%';
                    star.style.top = Math.random() * 100 + '%';
                    star.style.animationDelay = Math.random() * 5 + 's';
                    field.appendChild(star);
                }
            }

            // 2. 核心智能逻辑：页面无缝平滑切换
            const smartBackBtn = document.getElementById('smartBackBtn');
            const selectionScreen = document.getElementById('selectionScreen');
            const iframeScreen = document.getElementById('iframeScreen');
            const mosaicIframe = document.getElementById('mosaicIframe');
            const headerTitle = document.getElementById('headerTitle');

            let isViewingMosaic = false;

            function updateHeaderText(newTitle, newBtnText) {
                if(!headerTitle || !smartBackBtn) return; 
                headerTitle.style.opacity = 0;
                smartBackBtn.style.opacity = 0;
                
                setTimeout(() => {
                    headerTitle.innerText = newTitle;
                    smartBackBtn.innerText = newBtnText;
                    headerTitle.style.opacity = 1;
                    smartBackBtn.style.opacity = 1;
                }, 300);
            }

            // 【抽出公共的关闭画卷逻辑，供按钮和返回键共同调用】
            function closeMosaic() {
                if (!isViewingMosaic) return;
                
                iframeScreen.classList.remove('screen-active');
                iframeScreen.classList.add('screen-hidden');
                
                selectionScreen.classList.remove('screen-hidden');
                selectionScreen.classList.add('screen-active');
                
                updateHeaderText('千人成像巨献', '← 返回');
                
                setTimeout(() => {
                    mosaicIframe.src = ''; 
                }, 600);
                
                isViewingMosaic = false;
            }

            // 挂载：打开画卷
            window.openMosaic = function(url, subtitle) {
                if(!mosaicIframe || !selectionScreen || !iframeScreen) return;
                
                mosaicIframe.src = url;
                selectionScreen.classList.remove('screen-active');
                selectionScreen.classList.add('screen-hidden');
                
                iframeScreen.classList.remove('screen-hidden');
                iframeScreen.classList.add('screen-active');
                
                updateHeaderText(`千人成像 · ${subtitle}`, '← 返回选图');
                isViewingMosaic = true;

                // 【拦截返回键核心】：往浏览器历史记录里塞入一个带有 #viewing 的伪装状态
                history.pushState({ mosaicOpen: true }, '', '#viewing');
            };

            window.showLockedAlert = function() {
                alert("此画卷将在 6月25日 正式解锁，敬请期待！");
            };

            // 绑定返回按钮逻辑
            if (smartBackBtn) {
                smartBackBtn.addEventListener('click', function(e) {
                    if (isViewingMosaic) {
                        e.preventDefault(); 
                        e.stopPropagation(); // 【核心修复 1】：阻止事件冒泡！绝不让外层 PJAX 抢走这个点击事件
                        
                        closeMosaic();
                        
                        // 点网页上按钮返回时，也要把地址栏里的 #viewing 抹掉，保持历史栈干净
                        if (window.location.hash === '#viewing') {
                            history.back();
                        }
                    }
                });
            }

            // 【核心修复 2】：监听手机侧滑返回 / 浏览器原生返回键
            window.addEventListener('popstate', function(e) {
                // 如果当前正在看图，且地址栏的 #viewing 没了（说明用户按了返回键）
                if (isViewingMosaic && window.location.hash !== '#viewing') {
                    closeMosaic();
                }
            });
            
        })();
    </script>
    </div>
  <script src="https://1818461212.v.123pan.cn/1818461212/%E7%BD%91%E7%AB%99/mj.lyimc.top/mj-music.js"></script>
  <script src="https://1818461212.v.123pan.cn/1818461212/%E7%BD%91%E7%AB%99/mj.lyimc.top/mj-pjax.js"></script>
</body>
</html>

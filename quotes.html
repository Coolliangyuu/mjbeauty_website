<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0f0c29">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <title>Neverland - 🌍𝐌𝐉全球华人之家🕊️</title>
    <link rel="shortcut icon" type="image/ico" href="https://1818461212.v.123pan.cn/1818461212/%E7%BD%91%E7%AB%99/mj.lyimc.top/logo.jpg">
    <meta property="og:type" content="website">
    <meta property="og:title" content="🌍𝐌𝐉全球华人之家🕊️">
    <meta property="og:description" content="Love Lives Forever - 迈克尔·杰克逊精神家园">
    <meta property="og:image" content="https://1818461212.v.123pan.cn/1818461212/%E7%BD%91%E7%AB%99/mj.lyimc.top/IMG_1483%281%29.png">

    <link rel="stylesheet" href="https://1818461212.v.123pan.cn/1818461212/%E7%BD%91%E7%AB%99/mj.lyimc.top/mj-quotes_css.css">

    <style>
        /* ==================================
           自定义留言字体载入
           ================================== */
        @font-face {
            font-family: 'MyMessageFont'; 
            src: url('https://1818461212.v.123pan.cn/1818461212/%E7%BD%91%E7%AB%99/mj.lyimc.top/LXGWWenKai-Regular.ttf'); 
            font-weight: normal;
            font-style: normal;
            font-display: swap; 
        }

        :root {
            --mj-gold: #f3cf7a;
            --mj-blue: #1a2a6c;
        }

        /* === Safari 白边修复 === */
        html { background-color: #0f0c29 !important; }

        body {
            margin: 0;
            padding: 0;
            background-color: #0f0c29 !important; 
            color: #fff;
            font-family: "Microsoft YaHei", sans-serif;
            min-height: 100vh;
        }

        /* 固定伪元素承载渐变背景 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            z-index: -2; 
            pointer-events: none;
        }

        /* --- Header --- */
        header {
            position: relative; 
            height: 60vh; 
            min-height: 220px; 
            display: flex;
            align-items: center;         
            justify-content: flex-start; 
            padding: 0 10%;              
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden; 
        }

        .header-bg-img {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; 
            object-position: top right; 
            z-index: 0; 
            pointer-events: none; 
        }

        header::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(to right, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 60%);
            z-index: 1; 
            pointer-events: none;
        }

        .header-content {
            position: relative;
            z-index: 2; 
            max-width: 50%; 
            display: flex;
            flex-direction: column; 
            align-items: center; 
            text-align: center;
        }

        .header-text-img {
            width: 100%; 
            height: auto;
            max-height: 60vh;
            object-fit: contain; 
            filter: drop-shadow(0px 5px 15px rgba(0, 0, 0, 0.6));
            transition: all 0.3s ease;
        }

        .header-slogan {
            margin-top: 0px;
            font-size: 1.25rem;
            color: #e0e0e0; 
            letter-spacing: 5px;
            font-weight: bold;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.9);
        }

        .header-sub-slogan {
            margin-top: 10px;
            font-size: 0.85rem;
            color: #b0b0b0; 
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 1px 5px rgba(0, 0, 0, 0.8);
        }

        /* --- 瀑布流 --- */
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 20px;
            column-count: 3;
            column-gap: 20px;
        }

        .message-card {
            break-inside: avoid;
            display: inline-block;
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px; 
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-sizing: border-box;
        }

        .message-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(243, 207, 122, 0.2);
            border-color: var(--mj-gold);
        }

        /* === 留言内容样式（已适配自定义字体） === */
        .content {
            font-family: 'MyMessageFont', "Microsoft YaHei", sans-serif; 
            font-size: 1.1rem; 
            line-height: 1.8; 
            margin-bottom: 20px;
            color: #e0e0e0;
            white-space: pre-wrap;
            letter-spacing: 1px; 
        }

        /* === 留言署名样式（已适配自定义字体） === */
        .author {
            font-family: 'MyMessageFont', "Microsoft YaHei", sans-serif; 
            text-align: right;
            font-weight: bold;
            color: var(--mj-gold);
            font-size: 0.95rem;
            border-top: 1px dashed rgba(255, 255, 255, 0.2);
            padding-top: 15px;
        }

        /* ==================================
           右下角悬浮留言按钮 (长方体包着内嵌的小正方体)
           ================================== */
        .add-quote-wrapper {
            position: fixed;
            bottom: 40px;
            right: 40px;
            display: flex;
            align-items: center;
            gap: 15px; 
            background: rgba(243, 207, 122, 0.1); 
            backdrop-filter: blur(15px); 
            border: 1px solid rgba(243, 207, 122, 0.3); 
            border-radius: 16px; 
            padding: 8px 8px 8px 20px; 
            text-decoration: none;
            z-index: 100;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .add-quote-wrapper:hover {
            transform: translateY(-5px);
            background: rgba(243, 207, 122, 0.2);
            box-shadow: 0 8px 25px rgba(243, 207, 122, 0.5);
            border-color: var(--mj-gold);
        }

        /* 左侧文字 */
        .add-text {
            color: var(--mj-gold);
            font-size: 0.95rem;
            letter-spacing: 2px;
            font-weight: bold;
            white-space: nowrap;
        }

        /* 右侧内嵌的小正方体按钮 */
        .add-inner-btn {
            width: 42px;
            height: 42px;
            background: rgba(243, 207, 122, 0.25);
            border: 1px solid rgba(243, 207, 122, 0.5);
            border-radius: 10px; 
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--mj-gold);
            font-size: 1.8rem;
            font-weight: 300;
            line-height: 1;
            transition: all 0.3s ease;
        }

        /* 鼠标悬停时，小方块变实心，非常有质感 */
        .add-quote-wrapper:hover .add-inner-btn {
            background: var(--mj-gold);
            color: #000;
            box-shadow: 0 0 15px rgba(243, 207, 122, 0.6);
        }

        footer {
            text-align: center;
            padding: 50px;
            font-size: 0.9rem;
            opacity: 0.7;
        }

        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.4) 100%);
        }

        /* 响应式适配 */
        @media (max-width: 900px) { 
            .container { column-count: 2; } 
            .header-content { max-width: 70%; }
        }
        @media (max-width: 600px) { 
            .container { column-count: 1; } 
            header {
                height: 35vh; 
                min-height: 180px;
                justify-content: center; 
                padding: 0 5%;
            }
            .header-content { max-width: 90%; } 
            .header-slogan { font-size: 1rem; letter-spacing: 3px; margin-top: 15px; }
            .header-sub-slogan { font-size: 0.7rem; letter-spacing: 1px; margin-top: 6px; }
            header::before { background: rgba(0,0,0,0.2); } 
            
            /* 手机端：长方体内嵌方块按钮缩小 */
            .add-quote-wrapper {
                bottom: 25px;
                right: 20px;
                padding: 6px 6px 6px 15px;
                border-radius: 14px; 
                gap: 10px;
            }
            .add-text {
                font-size: 0.8rem;
                letter-spacing: 1px;
            }
            .add-inner-btn {
                width: 36px;
                height: 36px;
                font-size: 1.5rem;
                border-radius: 8px; 
            }
            /* 修复加了 pjax-container 后的排版问题 */
            #pjax-container {
                width: 100%;
                height: 100%;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
            }
            
            footer { padding-bottom: 90px; } 
        }

        #loading { text-align: center; color: var(--mj-gold); padding: 50px; }
        
        /* =========================================
           🎵 音乐播放器内置向下延展提示框 (心语墙专属版)
           ========================================= */
        #mj-quotes-prompt-panel {
            display: none; 
            margin-top: 15px;
            border-top: 1px solid rgba(255,255,255,0.1); 
            padding-top: 15px;
            text-align: center;
            animation: slideDownIn 0.4s cubic-bezier(0.19, 1, 0.22, 1);
        }
        #mj-quotes-prompt-panel.show {
            display: block;
        }
        .mj-prompt-text {
            color: rgba(255,255,255,0.85);
            font-size: 0.85rem;
            line-height: 1.6;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }
        .mj-prompt-text strong {
            color: var(--mj-gold); /* 适配心语墙的主题金 */
            font-weight: normal;
        }
        .mj-prompt-btns {
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .mj-prompt-btn {
            background: rgba(243, 207, 122, 0.15);
            border: 1px solid var(--mj-gold);
            color: var(--mj-gold);
            padding: 8px 15px;
            border-radius: 12px;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.3s ease;
            flex: 1;
            outline: none;
        }
        .mj-prompt-btn:hover {
            background: var(--mj-gold);
            color: #000;
            box-shadow: 0 0 15px rgba(243, 207, 122, 0.3);
        }
        .mj-prompt-btn.cancel {
            background: transparent;
            border-color: rgba(255,255,255,0.2);
            color: #aaa;
        }
        .mj-prompt-btn.cancel:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        @keyframes slideDownIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
<div id="pjax-container">
    <div class="stars"></div>

    <header>
        <img src="https://1818461212.v.123pan.cn/1818461212/%E7%BD%91%E7%AB%99/mj.lyimc.top/quotes/bg.png" class="header-bg-img" alt="MJ Stage Background">
        
        <div class="header-content">
            <img src="https://1818461212.v.123pan.cn/1818461212/%E7%BD%91%E7%AB%99/mj.lyimc.top/quotes/text.png" class="header-text-img" alt="Michael Jackson KING OF POP Love lives forever">
            <div class="header-slogan">🌍𝐌𝐉全球华人之家🕊️</div>
            <div class="header-sub-slogan">永驻心中的梦幻庄园 · Forever Neverland</div>
        </div>
    </header>

    <div id="loading">正在连接 Neverland...</div>
    <div class="container" id="messageBoard"></div>

    <a href="https://docs.qq.com/form/page/DRkFPekt3S1hYSEFh" target="_blank" class="add-quote-wrapper">
        <span class="add-text">我也有话对迈说</span>
        <div class="add-inner-btn">+</div>
    </a>

    <footer>
        <p>Keep on dancing, Michael. We love you more.</p>
    </footer>

    <script>
        // 用匿名函数包裹，防止 PJAX 重复进入时产生 const 变量冲突报错
        (function() {
            const TXT_URL = './mj-quotes.txt';

            async function fetchAndParse() {
                const board = document.getElementById('messageBoard');
                const loading = document.getElementById('loading');
                
                if (!board || !loading) return; 

                try {
                    const response = await fetch(TXT_URL);
                    if (!response.ok) throw new Error();
                    
                    const rawText = await response.text();
                    const lines = rawText.split('\n').filter(line => line.trim() !== '');
                    
                    loading.style.display = 'none';
                    
                    // 【关键修复】清空面板，防止 PJAX 来回切换导致留言重复叠加
                    board.innerHTML = ''; 

                    lines.forEach(line => {
                        let contentText = line;
                        let authorText = '';

                        if (line.includes('爱来自@')) {
                            const parts = line.split('爱来自@');
                            contentText = parts[0].trim();
                            authorText = '爱来自 @' + parts[1].trim();
                        }

                        const card = document.createElement('div');
                        card.className = 'message-card';
                        
                        let html = `<div class="content">${contentText}</div>`;
                        if (authorText) {
                            html += `<div class="author">—— ${authorText}</div>`;
                        }
                        
                        card.innerHTML = html;
                        board.appendChild(card);
                    });

                } catch (error) {
                    loading.innerText = '连接 Neverland 失败，请联系管理员检查。';
                    console.error(error);
                }
            }

            fetchAndParse();
        })();

        // ==========================================
        // 🎵 智能捕获并向下延展播放器面板 (心语墙专属推荐版)
        // ==========================================
        (function() {
            // 如果用户已经点过，就不再打扰（开发测试阶段可先注释掉下面这行）
            // if (sessionStorage.getItem('mj_quotes_handled')) return;

            // 1. 【防翻倍第一道防线】每次加载脚本，第一件事就是无情斩杀可能存在的旧面板
            const existingPanel = document.getElementById('mj-quotes-prompt-panel');
            if (existingPanel) {
                existingPanel.remove();
            }

            // 2. 轮询等待全局播放器组件渲染就位
            const checkPlayerInterval = setInterval(() => {
                const playerBody = document.querySelector('.mj-player-body');
                if (playerBody) {
                    clearInterval(checkPlayerInterval);
                    
                    // 【防翻倍第二道防线】双保险拦截
                    if (!document.getElementById('mj-quotes-prompt-panel')) {
                        injectQuotesPrompt(playerBody); 
                    }
                }
            }, 200);

            function injectQuotesPrompt(playerBody) {
                // 创建心语墙专属的选项卡面板
                const promptPanel = document.createElement('div');
                promptPanel.id = 'mj-quotes-prompt-panel';
                promptPanel.innerHTML = `
                    <div class="mj-prompt-text">
                        <strong>✨ 迈寇，你并不孤独。</strong><br>
                        当思念化作漫天星光，一首<br>
                        <strong>You Are Not Alone</strong><br>
                        陪伴我们心中永远的米高·积逊
                    </div>
                    <div class="mj-prompt-btns">
                        <button class="mj-prompt-btn" onclick="acceptQuotesMusic()">播放音乐</button>
                        <button class="mj-prompt-btn cancel" onclick="closeQuotesMusic()">静静浏览</button>
                    </div>
                `;
                
                // 塞入播放器内部
                const resizer = document.getElementById('mj-resizer');
                if(resizer) {
                    playerBody.insertBefore(promptPanel, resizer);
                } else {
                    playerBody.appendChild(promptPanel);
                }

                // 延迟 0.5 秒后，让它在播放器下方平滑地展开
                setTimeout(() => {
                    // 确保播放器没有被用户最小化
                    const playerDiv = document.getElementById('mj-music-player');
                    if(playerDiv && playerDiv.classList.contains('minimized')) {
                        playerDiv.classList.remove('minimized');
                        const minBtn = document.getElementById('mj-minimize-btn');
                        if (minBtn) minBtn.innerText = "_";
                    }
                    promptPanel.classList.add('show');
                }, 500);

                // 🚀 【核心黑科技：DOM 特征主动防御自毁守护进程】
                // 只要发现本页特有的 #messageBoard 消失了，说明用户绝对已经 PJAX 离页或返回了，立刻自毁！
                const pjaxGuardInterval = setInterval(() => {
                    if (!document.getElementById('messageBoard')) {
                        clearInterval(pjaxGuardInterval);
                        promptPanel.remove(); 
                        console.log("🧹 守卫：检测到离开心语墙，已精准完成自毁清理");
                    }
                }, 300);
            }

            // 选项1：立即播放指定温柔歌曲
            window.acceptQuotesMusic = function() {
                const playlistItems = document.querySelectorAll('.mj-playlist-item');
                let targetFound = false;
                for(let item of playlistItems) {
                    // 寻找指定的温柔催泪神曲
                    if(item.innerText.toLowerCase().includes("you are not alone")) {
                        item.click(); 
                        targetFound = true;
                        break;
                    }
                }
                if(!targetFound) {
                    const playBtn = document.getElementById('mj-play-btn');
                    if(playBtn) playBtn.click();
                }
                closeQuotesMusic();
            };

            // 选项2：静静浏览 / 关闭
            window.closeQuotesMusic = function() {
                const promptPanel = document.getElementById('mj-quotes-prompt-panel');
                if (promptPanel) {
                    promptPanel.remove();
                }
                sessionStorage.setItem('mj_quotes_handled', 'true');
            };
        })();
    </script>
</div>

  <script src="https://1818461212.v.123pan.cn/1818461212/%E7%BD%91%E7%AB%99/mj.lyimc.top/mj-music.js"></script>
  <script src="https://1818461212.v.123pan.cn/1818461212/%E7%BD%91%E7%AB%99/mj.lyimc.top/mj-pjax.js"></script>
  
</body>
</html>
